<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>区民の声 サマリーカード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Noto Sans JP', sans-serif;
    background: transparent;
    height: 100%;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 4px 2px;
  }
  .card {
    border-radius: 12px;
    padding: 16px 18px 14px;
    position: relative;
    overflow: hidden;
  }
  .card-all  { background: #F1EFE8; border: 1px solid #D3D1C7; }
  .card-new  { background: #E6F1FB; border: 1px solid #B5D4F4; }
  .card-wip  { background: #FAEEDA; border: 1px solid #FAC775; }
  .card-done { background: #EAF3DE; border: 1px solid #C0DD97; }

  .card-icon { font-size: 16px; margin-bottom: 6px; line-height: 1; }

  .card-num { font-size: 36px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
  .card-all  .card-num { color: #2C2C2A; }
  .card-new  .card-num { color: #0C447C; }
  .card-wip  .card-num { color: #633806; }
  .card-done .card-num { color: #173404; }

  .card-label { font-size: 13px; font-weight: 500; }
  .card-all  .card-label { color: #444441; }
  .card-new  .card-label { color: #185FA5; }
  .card-wip  .card-label { color: #BA7517; }
  .card-done .card-label { color: #3B6D11; }

  .card-sub { font-size: 11px; margin-top: 3px; }
  .card-all  .card-sub { color: #888780; }
  .card-new  .card-sub { color: #378ADD; }
  .card-wip  .card-sub { color: #EF9F27; }
  .card-done .card-sub { color: #639922; }

  .card-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px; width: 100%;
  }
  .card-all  .card-bar { background: #888780; }
  .card-new  .card-bar { background: #378ADD; }
  .card-wip  .card-bar { background: #EF9F27; }
  .card-done .card-bar { background: #639922; }

  .updated {
    text-align: right;
    font-size: 10px;
    color: #aaa;
    margin-top: 6px;
    padding-right: 2px;
  }
</style>
</head>
<body>

<div class="grid" id="grid"></div>
<div class="updated" id="updated"></div>

<script>
  // URLパラメーターから数字を読み取る
  const params = new URLSearchParams(window.location.search);
  const total = params.get('total') || '0';
  const nw    = params.get('new')   || '0';
  const wip   = params.get('wip')   || '0';
  const done  = params.get('done')  || '0';

  const cards = [
    { cls: 'card-all',  icon: '📋', num: total, label: '受付件数', sub: '全体' },
    { cls: 'card-new',  icon: '🔵', num: nw,    label: '新規受付', sub: '未対応' },
    { cls: 'card-wip',  icon: '🟡', num: wip,   label: '調査中',   sub: '対応中' },
    { cls: 'card-done', icon: '🟢', num: done,  label: '回答済み', sub: '完了' },
  ];

  document.getElementById('grid').innerHTML = cards.map(c => `
    <div class="card ${c.cls}">
      <div class="card-icon">${c.icon}</div>
      <div class="card-num">${c.num}</div>
      <div class="card-label">${c.label}</div>
      <div class="card-sub">${c.sub}</div>
      <div class="card-bar"></div>
    </div>
  `).join('');

  // 更新日時を表示
  const now = new Date();
  const dateStr = now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate();
  document.getElementById('updated').textContent = '最終更新: ' + dateStr;
</script>
</body>
</html>
